name: Update movie sort titles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sort-titles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update sort titles from TMDb collections
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/update_sort_titles.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update movie sort titles from TMDb"
          file_pattern: metadata/movies/movies.yml
