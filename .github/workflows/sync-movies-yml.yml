---
name: Sync Kometa movies.yml

on:
  push:
    paths:
      - "metadata/movies/assets/**"
      - "scripts/sync_movies_yml.py"
      - "requirements.txt"

permissions:
  contents: write

# Evita que dos ejecuciones intenten pushear a la vez en la misma rama
concurrency:
  group: sync-movies-yml-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sync YAML
        run: python scripts/sync_movies_yml.py

      - name: Commit changes (if any)
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reintenta regenerando el YAML desde cero sobre el último main en
          # cada intento, en vez de rebasar un commit desactualizado: así no
          # hay conflictos posibles si otra ejecución (p. ej. otro poster
          # subido casi a la vez) ya empujó su propio cambio.
          for attempt in 1 2 3 4 5; do
            git add metadata/movies/movies.yml
            if git diff --cached --quiet; then
              echo "No changes."
              exit 0
            fi

            git commit -m "chore: sync movies.yml from assets"

            if git push origin HEAD:main; then
              echo "Push OK (intento $attempt)"
              exit 0
            fi

            echo "Push rechazado (intento $attempt), reintentando..."
            git reset --soft HEAD~1
            git fetch origin main
            git reset --hard origin/main
            python scripts/sync_movies_yml.py
            sleep $((attempt * 3))
          done

          echo "No se pudo empujar movies.yml tras varios intentos" >&2
          exit 1
