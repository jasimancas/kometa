---
name: Sync Kometa movies.yml

on:
  push:
    paths:
      - "metadata/movies/assets/**"
      - "scripts/sync_movies_yml.py"
      - "requirements.txt"

permissions:
  contents: write

# Evita que dos ejecuciones intenten pushear a la vez en la misma rama
concurrency:
  group: sync-movies-yml-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sync YAML
        run: python scripts/sync_movies_yml.py

      - name: Commit changes (if any)
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add metadata/movies/movies.yml
          git commit -m "chore: sync movies.yml from assets"

          # Trae lo último de main y rebasa tu commit encima para evitar non-fast-forward
          git fetch origin main
          git rebase origin/main

          # Push; si otra ejecución se adelantó, rebase y reintenta una vez
          git push origin HEAD:main || (
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          )
